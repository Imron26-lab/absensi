<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS: Navigator Digital ULW</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; }
        
        /* Form Identitas */
        .student-info {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #2980b9;
        }
        .input-group { flex: 1; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
        .input-group input {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;
        }

        /* Area Papan TTS */
        .tts-layout { display: flex; flex-wrap: wrap; gap: 40px; }
        .board-container { flex: 1 1 100%; overflow-x: auto; padding-bottom: 10px; }
        #crossword-board {
            display: grid; gap: 1px; background-color: #222; padding: 2px; width: max-content; margin: 0 auto;
        }
        .cell-wrapper { position: relative; width: 40px; height: 40px; background-color: #fff; }
        .cell-input {
            width: 100%; height: 100%; border: none; text-align: center; text-transform: uppercase;
            font-size: 20px; font-weight: bold; outline: none; background: transparent; padding-top: 10px; color: #2c3e50;
        }
        .cell-input:focus { background-color: #e8f4f8; }
        .cell-number {
            position: absolute; top: 2px; left: 3px; font-size: 11px; font-weight: bold; color: #555; pointer-events: none;
        }
        
        /* Soal */
        .clues-container { flex: 1 1 100%; display: flex; flex-wrap: wrap; gap: 20px; }
        .clue-box { flex: 1 1 45%; background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid #3498db; }
        .clue-box h3 { margin-top: 0; color: #2980b9; }
        .clue-item { margin-bottom: 10px; line-height: 1.5; font-size: 14px; }
        
        /* Skor & Tombol */
        .action-container { flex: 1 1 100%; text-align: center; margin-top: 20px; }
        .btn {
            background-color: #27ae60; color: white; border: none; padding: 12px 30px;
            font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s;
        }
        .btn:hover { background-color: #219150; }
        .btn-print { background-color: #e67e22; display: none; margin-left: 10px;}
        .btn-print:hover { background-color: #d35400; }
        
        #hasil-nilai {
            display: none; font-size: 24px; font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 8px;
        }
        .lulus { background-color: #d4edda; color: #155724; }
        .remedial { background-color: #f8d7da; color: #721c24; }

        /* Pengaturan Cetak PDF (Hanya elemen penting yang di-print) */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            .clues-container, .btn, .btn-print, .subtitle { display: none !important; }
            .student-info { border: 2px solid #000; background: white; }
            .input-group input { border: none; font-weight: bold; font-size: 18px; }
            #crossword-board { border: 2px solid #000; }
        }

        @media (max-width: 768px) {
            .clue-box { flex: 1 1 100%; }
            .student-info { flex-direction: column; gap: 10px; }
            .cell-wrapper { width: 35px; height: 35px; }
            .cell-input { font-size: 16px; padding-top: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>LEMBAR KERJA TTS</h1>
    <p class="subtitle">Mata Pelajaran: Produk Kreatif / ULW</p>

    <div class="student-info">
        <div class="input-group">
            <label for="namaSiswa">Nama Lengkap Siswa:</label>
            <input type="text" id="namaSiswa" placeholder="Ketik nama di sini..." required>
        </div>
        <div class="input-group">
            <label for="kelasSiswa">Kelas:</label>
            <input type="text" id="kelasSiswa" placeholder="Contoh: XII ULW 1" required>
        </div>
    </div>

    <div class="tts-layout">
        <div class="board-container">
            <div id="crossword-board"></div>
        </div>

        <div class="action-container">
            <div id="hasil-nilai"></div>
            <br>
            <button id="btn-submit" class="btn" onclick="cekJawaban()">Kumpulkan & Cek Nilai</button>
            <button id="btn-print" class="btn btn-print" onclick="window.print()">Cetak Hasil (PDF) untuk Guru</button>
        </div>

        <div class="clues-container">
            <div class="clue-box" id="clues-across">
                <h3>MENDATAR</h3>
            </div>
            <div class="clue-box" id="clues-down">
                <h3>MENURUN</h3>
            </div>
        </div>
    </div>
</div>

<script>
    const words = [
        { id: 1, dir: 'H', text: 'RANKING', r: 4, c: 5, clue: 'Tahapan algoritma menilai relevansi & Search Intent.' },
        { id: 2, dir: 'H', text: 'MINUS', r: 8, c: 6, clue: 'Tanda baca operator Boolean "NOT" pembuang topik.' },
        { id: 3, dir: 'H', text: 'SEMANTIK', r: 5, c: 8, clue: 'Ambiguitas akibat kata kunci tunggal kurang konteks.' },
        { id: 4, dir: 'H', text: 'FARE', r: 7, c: 11, clue: 'Sistem harga kursi pesawat oleh maskapai (___ Class).' },
        { id: 5, dir: 'H', text: 'OR', r: 1, c: 5, clue: 'Operator Boolean mencari alternatif/sinonim.' },
        { id: 6, dir: 'V', text: 'SPIDER', r: 3, c: 14, clue: 'Sebutan robot penjelajah internet (selain Crawler).' },
        { id: 7, dir: 'V', text: 'LONGTAIL', r: 2, c: 7, clue: 'Keyword 4 kata+, konversi tinggi, saingan rendah.' },
        { id: 8, dir: 'V', text: 'OVERLOAD', r: 1, c: 5, clue: 'Bencana beban informasi Gen Z (Information ___).' },
        { id: 9, dir: 'V', text: 'B2B', r: 2, c: 3, clue: 'Jalur tiket VIP khusus agen ULW (Group Desk).' },
        { id: 10, dir: 'V', text: 'TAKSI', r: 2, c: 8, clue: 'Sopir digital yang butuh konteks tujuan.' }
    ];

    let maxR = 0; let maxC = 0;
    const gridData = {};

    words.forEach(w => {
        for (let i = 0; i < w.text.length; i++) {
            let row = w.r + (w.dir === 'V' ? i : 0);
            let col = w.c + (w.dir === 'H' ? i : 0);
            let key = `${row}-${col}`;
            
            if (row > maxR) maxR = row;
            if (col > maxC) maxC = col;

            if (!gridData[key]) {
                gridData[key] = { answer: w.text[i], numbers: [] };
            }
            if (i === 0) gridData[key].numbers.push(w.id);
        }
    });

    const board = document.getElementById('crossword-board');
    board.style.gridTemplateColumns = `repeat(${maxC}, 1fr)`;
    board.style.gridTemplateRows = `repeat(${maxR}, 1fr)`;

    for (let r = 1; r <= maxR; r++) {
        for (let c = 1; c <= maxC; c++) {
            let key = `${r}-${c}`;
            if (gridData[key]) {
                let cellData = gridData[key];
                let label = cellData.numbers.length > 0 ? cellData.numbers.join('/') : '';
                
                let cellHTML = `
                    <div class="cell-wrapper" style="grid-row: ${r}; grid-column: ${c};">
                        ${label ? `<div class="cell-number">${label}</div>` : ''}
                        <input type="text" class="cell-input" maxlength="1" data-answer="${cellData.answer}">
                    </div>
                `;
                board.insertAdjacentHTML('beforeend', cellHTML);
            }
        }
    }

    const listAcross = document.getElementById('clues-across');
    const listDown = document.getElementById('clues-down');

    words.forEach(w => {
        let itemHTML = `<div class="clue-item"><strong>${w.id}.</strong> ${w.clue}</div>`;
        if (w.dir === 'H') listAcross.insertAdjacentHTML('beforeend', itemHTML);
        else listDown.insertAdjacentHTML('beforeend', itemHTML);
    });

    // GANTI TULISAN DI BAWAH INI DENGAN URL DARI GOOGLE APPS SCRIPT-MU
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsBYcHETVENhHlnTdBUSE8xEy3h5nsH7FFFjmeGn4FCA1V8GYXo3Xwy6YduMo4eYMzTQ/exec';

    function cekJawaban() {
        let nama = document.getElementById('namaSiswa').value;
        let kelas = document.getElementById('kelasSiswa').value;
        let btnSubmit = document.getElementById('btn-submit');

        if (nama.trim() === "" || kelas.trim() === "") {
            alert("⚠️ Harap isi Nama dan Kelas terlebih dahulu!");
            return;
        }

        // Ubah tombol jadi "Loading" biar siswa tidak klik 2 kali
        btnSubmit.innerText = "Mengirim data...";
        btnSubmit.disabled = true;

        let inputs = document.querySelectorAll('.cell-input');
        let totalKotak = inputs.length;
        let kotakBenar = 0;

        inputs.forEach(input => {
            let jawabanUser = input.value.toUpperCase();
            let kunci = input.getAttribute('data-answer');

            input.setAttribute('readonly', true);
            
            if (jawabanUser === kunci) {
                input.style.backgroundColor = "#c8e6c9"; 
                input.style.color = "#2e7d32";
                kotakBenar++;
            } else {
                input.style.backgroundColor = "#ffcdd2"; 
                input.style.color = "#c62828";
            }
        });

        // Kunci input identitas
        document.getElementById('namaSiswa').setAttribute('readonly', true);
        document.getElementById('kelasSiswa').setAttribute('readonly', true);

        // Hitung Nilai Skala 100
        let nilaiAkhir = Math.round((kotakBenar / totalKotak) * 100);
        
        // --- PROSES MENGIRIM DATA KE GOOGLE SHEETS ---
        let formData = new FormData();
        formData.append('nama', nama);
        formData.append('kelas', kelas);
        formData.append('nilai', nilaiAkhir);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(result => {
            if(result === "Sukses") {
                // Tampilkan Hasil di Layar Siswa jika berhasil terkirim
                let areaHasil = document.getElementById('hasil-nilai');
                areaHasil.style.display = "block";
                
                if (nilaiAkhir >= 75) {
                    areaHasil.className = "lulus";
                    areaHasil.innerHTML = `Luar Biasa! Nilai Anda: ${nilaiAkhir} / 100`;
                } else {
                    areaHasil.className = "remedial";
                    areaHasil.innerHTML = `Tetap Semangat! Nilai Anda: ${nilaiAkhir} / 100`;
                }

                btnSubmit.style.display = "none"; // Hilangkan tombol agar tidak dikirim ulang
                alert("✅ Nilai berhasil masuk ke sistem Pak Guru!");
            }
        })
        .catch(error => {
            alert("❌ Terjadi kesalahan koneksi internet. Gagal mengirim nilai.");
            btnSubmit.innerText = "Coba Kumpulkan Lagi";
            btnSubmit.disabled = false;
        });
    }
</script>

</body>
</html>
